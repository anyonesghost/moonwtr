<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="eglow" cx="50%" cy="65%" r="50%">
      <stop offset="0%" stop-color="#5a2090" stop-opacity="0.8"/>
      <stop offset="40%" stop-color="#2a0a50" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#04030a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ecore" cx="50%" cy="65%" r="20%">
      <stop offset="0%" stop-color="#e0c8ff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#9b4fde" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#04030a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#04030a"/>
  <!-- Ground plane -->
  <ellipse cx="400" cy="420" rx="360" ry="40" fill="#0d0818" opacity="0.9"/>
  <ellipse cx="400" cy="420" rx="260" ry="28" fill="#15102a" opacity="0.7"/>
  <!-- Outer glow rings -->
  <ellipse cx="400" cy="390" rx="220" ry="50" stroke="#3d1060" stroke-width="1" fill="none" opacity="0.4"/>
  <ellipse cx="400" cy="390" rx="170" ry="38" stroke="#5a2090" stroke-width="1" fill="none" opacity="0.5"/>
  <ellipse cx="400" cy="390" rx="120" ry="26" stroke="#7b2fbe" stroke-width="1.5" fill="none" opacity="0.6"/>
  <ellipse cx="400" cy="390" rx="75" ry="16" stroke="#9b4fde" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Rising form — vertical shards -->
  <path d="M400,390 L388,200 L400,230 L412,200 Z" fill="#9b4fde" opacity="0.15"/>
  <path d="M400,380 L394,260 L400,290 L406,260 Z" fill="#c8a0f0" opacity="0.2"/>
  <!-- Core emerging form -->
  <ellipse cx="400" cy="385" rx="28" ry="32" fill="url(#eglow)"/>
  <ellipse cx="400" cy="380" rx="14" ry="16" fill="url(#ecore)"/>
  <!-- Central bright point -->
  <ellipse cx="400" cy="375" rx="5" ry="6" fill="#f0e8ff" opacity="0.9"/>
  <!-- Particle scatter -->
  <circle cx="340" cy="340" r="2" fill="#9b4fde" opacity="0.6"/>
  <circle cx="460" cy="345" r="1.5" fill="#9b4fde" opacity="0.5"/>
  <circle cx="320" cy="310" r="1.2" fill="#7b2fbe" opacity="0.4"/>
  <circle cx="480" cy="320" r="1.8" fill="#7b2fbe" opacity="0.4"/>
  <circle cx="360" cy="280" r="1" fill="#c8a0f0" opacity="0.5"/>
  <circle cx="440" cy="275" r="1" fill="#c8a0f0" opacity="0.4"/>
  <circle cx="380" cy="240" r="1.2" fill="#c8a0f0" opacity="0.35"/>
  <circle cx="418" cy="245" r="0.8" fill="#c8a0f0" opacity="0.3"/>
  <circle cx="355" cy="360" r="1.5" fill="#9b4fde" opacity="0.5"/>
  <circle cx="445" cy="365" r="1.2" fill="#9b4fde" opacity="0.45"/>
  <!-- Cracks in ground -->
  <path d="M400,410 Q370,408 350,415" stroke="#3d1060" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M400,410 Q430,408 450,415" stroke="#3d1060" stroke-width="1.5" fill="none" opacity="0.7"/>
  <path d="M400,415 Q390,420 375,425" stroke="#2a0a50" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M400,415 Q410,420 425,425" stroke="#2a0a50" stroke-width="1" fill="none" opacity="0.5"/>
  <!-- Dark top — void above -->
  <rect width="800" height="160" fill="#04030a" opacity="0.6"/>
</svg>
