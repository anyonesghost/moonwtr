<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="cleft" cx="28%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1a3a6e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#04030c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cright" cx="72%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#5a0a90" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#04030c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ccenter" cx="50%" cy="50%" r="15%">
      <stop offset="0%" stop-color="#e0c8ff" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#9b4fde" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#04030c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#04030c"/>
  <!-- World glows -->
  <ellipse cx="225" cy="300" rx="220" ry="260" fill="url(#cleft)"/>
  <ellipse cx="575" cy="300" rx="220" ry="260" fill="url(#cright)"/>
  <!-- Tension line at center -->
  <line x1="400" y1="0" x2="400" y2="600" stroke="#4a0080" stroke-width="1" opacity="0.3"/>
  <!-- Left world — geometric/angular -->
  <rect x="80" y="180" width="200" height="240" rx="4" stroke="#2a5090" stroke-width="1.5" fill="none" opacity="0.4"/>
  <rect x="110" y="210" width="140" height="180" rx="2" stroke="#2a5090" stroke-width="1" fill="none" opacity="0.3"/>
  <line x1="80" y1="300" x2="280" y2="300" stroke="#2a5090" stroke-width="1" opacity="0.25"/>
  <line x1="180" y1="180" x2="180" y2="420" stroke="#2a5090" stroke-width="1" opacity="0.25"/>
  <circle cx="180" cy="300" r="24" stroke="#4a80c0" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="180" cy="300" r="8" fill="#4a80c0" opacity="0.3"/>
  <!-- Right world — organic/curved -->
  <path d="M520,180 Q640,220 660,300 Q640,380 520,420 Q440,380 460,300 Q440,220 520,180 Z" stroke="#7b2fbe" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M540,220 Q620,250 640,300 Q620,350 540,380 Q480,350 495,300 Q480,250 540,220 Z" stroke="#9b4fde" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="580" cy="300" r="20" fill="#7b2fbe" opacity="0.2"/>
  <circle cx="580" cy="300" r="6" fill="#c8a0f0" opacity="0.5"/>
  <!-- Convergence point -->
  <ellipse cx="400" cy="300" rx="30" ry="40" fill="url(#ccenter)"/>
  <circle cx="400" cy="300" r="5" fill="#f0e8ff" opacity="0.8"/>
  <!-- Tension arcs -->
  <path d="M280,240 Q340,260 400,300" stroke="#4a80c0" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4,6"/>
  <path d="M280,360 Q340,340 400,300" stroke="#4a80c0" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4,6"/>
  <path d="M520,240 Q460,260 400,300" stroke="#7b2fbe" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4,6"/>
  <path d="M520,360 Q460,340 400,300" stroke="#7b2fbe" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4,6"/>
  <!-- Sparse stars -->
  <circle cx="50" cy="60" r="1" fill="#90b8e8" opacity="0.4"/>
  <circle cx="130" cy="30" r="0.8" fill="#90b8e8" opacity="0.3"/>
  <circle cx="680" cy="50" r="1" fill="#c8a0f0" opacity="0.4"/>
  <circle cx="750" cy="90" r="0.8" fill="#c8a0f0" opacity="0.3"/>
  <circle cx="720" cy="520" r="1" fill="#c8a0f0" opacity="0.25"/>
  <circle cx="60" cy="530" r="1" fill="#90b8e8" opacity="0.25"/>
</svg>
